name: CI

# Intelligent + parallel pipeline (cutover from the old 4-version matrix):
#   changes      — paths-filter; skips heavy work for docs-only changes
#   build-wheel  — compile the Rust ext ONCE (fast `ci` cargo profile), share via artifact
#   lint         — ruff + mypy, once
#   test         — 4 parallel shards (pytest-split), each a fresh runner VM
#   build / commitlint — preserved
#
# Python-version policy (TEST-23, deliberate cost decision — not a gap):
# the test suite runs on 3.12 ONLY. The 3.10–3.14 classifiers in
# pyproject.toml describe WHEEL compatibility, which is covered elsewhere:
# abi3 wheels are built once for cp310+ (release.yml) and smoke-imported
# on a 3.11/3.12/3.13 customer-environment matrix there. Adding a full
# test matrix would multiply CI cost without exercising new native code.

on:
  # Quota guard: no `push: main` trigger. Every change reaches main via a
  # squash-merged PR (ruleset 18484290 requires the PR checks), so the
  # post-merge tree is byte-identical to what the PR already tested —
  # re-running CI on main doubled the bill for zero signal. The weekly
  # cron is the drift guard (toolchain/image/dependency rot on an
  # untouched tree).
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  # paths-filter (the `changes` gate) and commitlint both read PR metadata
  # via the API on pull_request events; without this every PR run fails the
  # gate with "Resource not accessible by integration" and all real jobs
  # (lint/test/build) are skipped.
  pull-requests: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  # Cancel superseded runs on PRs/branches, but never cancel a main build.
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  PY_VERSION: "3.12"

jobs:
  changes:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4
        id: filter
        with:
          filters: |
            code:
              - 'furl_ctx/**'
              - 'crates/**'
              - '**/*.rs'
              - 'pyproject.toml'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'tests/**'
              - 'scripts/**'
              # Conclusion of the required checks (lint/build-wheel/test) no
              # longer depends on this filter: those jobs ALWAYS run and short-
              # circuit their heavy steps when code=='false' (step-level `if`
              # in each job), so every PR — regardless of diff shape —
              # CONCLUDES on all six required contexts. This filter now only
              # decides whether the EXPENSIVE work runs: it keeps the full
              # suite exercised for CI/plugin/docs changes, while config-only
              # PRs not listed here (e.g. .release-please-config.json, PR #56)
              # still CONCLUDE in seconds via the short-circuit.
              # Deadlock history — do NOT re-add job-level gating: #15, #32, #56.
              - '.github/workflows/**'
              - 'plugins/**'
              - '.claude-plugin/**'
              - '**/*.md'

  lint:
    # Required check — always runs so it CONCLUDES on every PR (ruleset
    # 18484290); the heavy steps below short-circuit when code=='false',
    # so a docs/config-only PR still concludes SUCCESS in seconds.
    needs: changes
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: ${{ env.PY_VERSION }}
      # Runs unconditionally (not gated behind needs.changes.outputs.code): llms.txt
      # is agent-orientation content, not `.md`, so a PR that edits only llms.txt
      # never trips the `code` path filter above — gating this step the same way
      # would let a broken doc anchor land silently. Pure stdlib, no repo import,
      # sub-second. Fails when llms.txt carries NO anchored doc links at all, so a
      # bad edit that strips or malforms the last reference cannot pass vacuously.
      # Keep in sync with tests/test_llms_txt_anchors.py, which runs the same check
      # locally as part of the full gated suite — divergence between the two
      # implementations is itself a bug.
      - name: llms.txt anchor guard
        shell: python
        run: |
          import re
          import sys
          from pathlib import Path

          llms_txt = Path("llms.txt").read_text(encoding="utf-8")
          # The files llms.txt links into by #anchor. Extend this tuple (and the
          # mirrored tests/test_llms_txt_anchors.py) if llms.txt ever gains anchored
          # links into another document — anchor_ref_re is derived from it, so refs
          # to a new doc cannot be silently skipped by a forgotten regex edit.
          doc_names = ("README.md", "LIBRARY.md")

          heading_re = re.compile(r"^#{1,6}\s+(.+?)\s*$")
          slug_strip_re = re.compile(r"[^\w\- ]")
          anchor_ref_re = re.compile(
              "(" + "|".join(re.escape(name) for name in doc_names) + ")#([A-Za-z0-9_-]+)"
          )


          def github_slug(heading_text):
              """Reproduce GitHub's heading-to-anchor slug algorithm."""
              slug = heading_text.strip().lower()
              slug = slug_strip_re.sub("", slug)
              return slug.replace(" ", "-")


          def anchor_slugs(markdown):
              """Every anchor GitHub would generate for a document's headings."""
              slugs = set()
              seen = {}
              in_fence = False
              for line in markdown.splitlines():
                  stripped = line.strip()
                  if stripped.startswith("```") or stripped.startswith("~~~"):
                      in_fence = not in_fence
                      continue
                  if in_fence:
                      continue
                  heading = heading_re.match(line)
                  if heading is None:
                      continue
                  base = github_slug(heading.group(1))
                  count = seen.get(base, 0)
                  seen[base] = count + 1
                  slugs.add(base if count == 0 else f"{base}-{count}")
              return slugs


          slugs_by_doc = {
              name: anchor_slugs(Path(name).read_text(encoding="utf-8")) for name in doc_names
          }
          refs = anchor_ref_re.findall(llms_txt)
          if not refs:
              print("llms.txt contains no README.md#.../LIBRARY.md#... anchor references at")
              print("all — this guard would pass vacuously. If removing the last anchored doc")
              print("link is deliberate, update this step and tests/test_llms_txt_anchors.py")
              print("together.")
              sys.exit(1)
          missing = sorted({f"{doc}#{anchor}" for doc, anchor in refs if anchor not in slugs_by_doc[doc]})
          if missing:
              print("llms.txt references anchors that do not exist in their target file:")
              for ref in missing:
                  print(f"  - {ref}")
              for doc in doc_names:
                  print(f"Valid {doc} anchors: {sorted(slugs_by_doc[doc])}")
              sys.exit(1)
          print(f"OK: {len(refs)} anchor reference(s) in llms.txt all resolve.")
      - name: Cache pip
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-lint-${{ hashFiles('pyproject.toml') }}
          restore-keys: ${{ runner.os }}-pip-lint-
      - if: needs.changes.outputs.code == 'true'
        run: python -m pip install --upgrade pip ruff==0.15.19 mypy==1.14.1
      - name: ruff check
        if: needs.changes.outputs.code == 'true'
        run: ruff check .
      - name: ruff format --check
        if: needs.changes.outputs.code == 'true'
        run: ruff format --check .
      - name: mypy
        if: needs.changes.outputs.code == 'true'
        run: mypy furl_ctx --ignore-missing-imports

  build-wheel:
    # Required check — always runs so it CONCLUDES on every PR (ruleset
    # 18484290); the heavy steps below short-circuit when code=='false',
    # so a docs/config-only PR still concludes SUCCESS in seconds.
    needs: changes
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: ${{ env.PY_VERSION }}
      # toolchain pinned to rust-toolchain.toml's version (TEST-30): the
      # action exports RUSTUP_TOOLCHAIN, which overrides the file — an
      # unpinned @stable would build with a different compiler than
      # rust.yml/local. Action ref stays @stable (see rust.yml note).
      - if: needs.changes.outputs.code == 'true'
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
        with:
          toolchain: 1.95.0  # keep in sync with rust-toolchain.toml
      - if: needs.changes.outputs.code == 'true'
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: ". -> target"
      - name: Build wheel once (fast CI cargo profile)
        if: needs.changes.outputs.code == 'true'
        run: |
          python -m pip install --upgrade pip maturin
          maturin build --profile ci --out dist --interpreter "python${PY_VERSION}"
      - if: needs.changes.outputs.code == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: furl-wheel
          path: dist/*.whl
          retention-days: 1

  test:
    # Required checks test (1..4) — always run so each shard CONCLUDES on
    # every PR (ruleset 18484290); the heavy steps below short-circuit when
    # code=='false', so a docs/config-only PR concludes SUCCESS in seconds.
    needs: [changes, build-wheel]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: ${{ env.PY_VERSION }}

      - name: Cache pip
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ env.PY_VERSION }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: ${{ runner.os }}-pip-${{ env.PY_VERSION }}-

      - name: Download prebuilt wheel
        if: needs.changes.outputs.code == 'true'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: furl-wheel
          path: dist

      - name: Install (prebuilt wheel + dev deps, no cargo rebuild)
        if: needs.changes.outputs.code == 'true'
        run: |
          python -m pip install --upgrade pip
          WHEEL="$(ls dist/*.whl)"
          pip install "${WHEEL}[dev]" pytest-split
          # cwd's ./furl_ctx source tree shadows the installed wheel; copy the
          # compiled extension in so tests import it (no second cargo build).
          SITE="$(python -c 'import sysconfig; print(sysconfig.get_path("platlib"))')"
          cp "${SITE}/furl_ctx/"_core*.so furl_ctx/
          python -c "from furl_ctx._core import DiffCompressor; print('furl_ctx._core OK')"

      - name: Run test shard ${{ matrix.shard }}/4
        if: needs.changes.outputs.code == 'true'
        run: |
          pytest tests \
            --splits 4 --group ${{ matrix.shard }} \
            --tb=short -q

  commitlint:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
      - uses: wagoid/commitlint-github-action@b948419dd99f3fd78a6548d48f94e3df7f6bf3ed # v6
        with:
          configFile: .commitlintrc.json

  build:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.11"
      - name: Cache pip
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-build-${{ hashFiles('pyproject.toml') }}
          restore-keys: ${{ runner.os }}-pip-build-
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
        with:
          toolchain: 1.95.0  # keep in sync with rust-toolchain.toml (TEST-30)
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: ". -> target"
      # Smoke check that the SHIPPED build (release profile) + sdist are wired
      # right; release.yml's matrix is what actually publishes to PyPI.
      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install 'maturin>=1.5,<2.0' twine
      - name: Build wheel + sdist
        run: |
          maturin sdist --out dist
          maturin build --release --out dist
      - name: Check package
        run: twine check dist/*

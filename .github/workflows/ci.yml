name: CI

# Intelligent + parallel pipeline (cutover from the old 4-version matrix):
#   changes      — paths-filter; skips heavy work for docs-only changes
#   build-wheel  — compile the Rust ext ONCE (fast `ci` cargo profile), share via artifact
#   lint         — ruff + mypy, once
#   test         — 4 parallel shards (pytest-split), each a fresh runner VM
#   build / commitlint — preserved
#
# Multi-version (3.10/3.11/3.13) coverage on main is a planned follow-up.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  # paths-filter (the `changes` gate) and commitlint both read PR metadata
  # via the API on pull_request events; without this every PR run fails the
  # gate with "Resource not accessible by integration" and all real jobs
  # (lint/test/build) are skipped.
  pull-requests: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  # Cancel superseded runs on PRs/branches, but never cancel a main build.
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  PY_VERSION: "3.12"

jobs:
  changes:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v7
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            code:
              - 'furl_ctx/**'
              - 'crates/**'
              - '**/*.rs'
              - 'pyproject.toml'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'tests/**'
              - 'scripts/**'
              - '.github/workflows/ci.yml'

  lint:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PY_VERSION }}
      - name: Cache pip
        uses: actions/cache@v6
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-lint-${{ hashFiles('pyproject.toml') }}
          restore-keys: ${{ runner.os }}-pip-lint-
      - run: python -m pip install --upgrade pip ruff==0.15.19 mypy==1.14.1
      - name: ruff check
        run: ruff check .
      - name: ruff format --check
        run: ruff format --check .
      - name: mypy
        run: mypy furl_ctx --ignore-missing-imports

  build-wheel:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PY_VERSION }}
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"
      - name: Build wheel once (fast CI cargo profile)
        run: |
          python -m pip install --upgrade pip maturin
          maturin build --profile ci --out dist --interpreter "python${PY_VERSION}"
      - uses: actions/upload-artifact@v7
        with:
          name: furl-wheel
          path: dist/*.whl
          retention-days: 1

  test:
    needs: [changes, build-wheel]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PY_VERSION }}

      - name: Cache pip
        uses: actions/cache@v6
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ env.PY_VERSION }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: ${{ runner.os }}-pip-${{ env.PY_VERSION }}-

      - name: Download prebuilt wheel
        uses: actions/download-artifact@v8
        with:
          name: furl-wheel
          path: dist

      - name: Install (prebuilt wheel + dev deps, no cargo rebuild)
        run: |
          python -m pip install --upgrade pip
          WHEEL="$(ls dist/*.whl)"
          pip install "${WHEEL}[dev]" pytest-split
          # cwd's ./furl_ctx source tree shadows the installed wheel; copy the
          # compiled extension in so tests import it (no second cargo build).
          SITE="$(python -c 'import sysconfig; print(sysconfig.get_path("platlib"))')"
          cp "${SITE}/furl_ctx/"_core*.so furl_ctx/
          python -c "from furl_ctx._core import DiffCompressor; print('furl_ctx._core OK')"

      - name: Run test shard ${{ matrix.shard }}/4
        run: |
          pytest tests \
            --splits 4 --group ${{ matrix.shard }} \
            --tb=short -q

  commitlint:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: wagoid/commitlint-github-action@v6
        with:
          configFile: .commitlintrc.json

  build:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Cache pip
        uses: actions/cache@v6
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-build-${{ hashFiles('pyproject.toml') }}
          restore-keys: ${{ runner.os }}-pip-build-
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"
      # Smoke check that the SHIPPED build (release profile) + sdist are wired
      # right; release.yml's matrix is what actually publishes to PyPI.
      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install 'maturin>=1.5,<2.0' twine
      - name: Build wheel + sdist
        run: |
          maturin sdist --out dist
          maturin build --release --out dist
      - name: Check package
        run: twine check dist/*

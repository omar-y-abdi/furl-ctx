name: Release

# ─── Package Registry Configuration ────────────────────────────────────────────
# Edit these constants to change package names, environments, and registries.
# All values are referenced via ${{ env.VAR }} throughout the workflow.
env:
  # PyPI
  PYPI_PACKAGE: furl-ctx
  PYPI_ENVIRONMENT: pypi

  # ─── Safety Gates ──────────────────────────────────────────────────────────────
  # The publish kill-switch is the repository Actions VARIABLE `PYPI_SKIP`
  # (read as `vars.PYPI_SKIP` by the publish-pypi and create-release gates
  # below) — NOT a workflow env constant. TEST-31: an env entry here was a
  # decoy the gates never read; an operator editing it still published.
  # Set it in GitHub: repo Settings → Secrets and variables → Actions →
  # Variables → New repository variable `PYPI_SKIP` = 'true'.
  # Locally via act: pass -e event.yml or set in .actrc.local (see
  # .actrc.local.example).
  # Semantics: 'true' short-circuits the `publish-pypi` job's own `if:` below
  # to skipped (no PyPI upload attempted) while still letting `create-release`
  # proceed. Any other value (`false`, unset, or anything else) requires
  # `publish-pypi` to actually run and succeed before `create-release` will
  # proceed. This comment intentionally does not state which value is set
  # right now: that is live repository state which drifts independently of
  # this file, so check it directly with `gh variable get PYPI_SKIP` or the
  # GitHub UI path above rather than trusting a comment to have kept up.

on:
  # Triggered when release-please's release PR is merged: the bot
  # tags the merge commit `vX.Y.Z` and creates a GitHub Release on
  # that tag, which fires the `release: published` event. Ordinary
  # pushes to main no longer trigger publishes — that was the old
  # behavior that burned PyPI's per-project storage quota by
  # uploading a fresh wheel matrix (~200 MB) per merged fix/feat PR.
  # See .github/workflows/release-please.yml for the PR-aggregator.
  release:
    types: [published]
  # X2: PR-time release dry-run. Trigger on PRs that touch release-
  # critical paths so the wheel matrix + smoke-import gate run BEFORE
  # merge — not after the tag is pushed and main is broken. Path
  # filter is deliberately narrow: source-only PRs that don't change
  # the wheel layout (the single `furl-ctx` wheel built from
  # `crates/furl-py`) don't need the dry-run.
  pull_request:
    paths:
      - ".github/workflows/release.yml"
      - "crates/furl-py/**"
      - "pyproject.toml"
      - "Cargo.toml"
      - "Cargo.lock"
  workflow_dispatch:
    inputs:
      version:
        description: "Manual version override"
        required: false
      dry_run:
        description: "Skip publish"
        type: boolean
        default: false

concurrency:
  # Main release runs are namespaced by ref_name and never cancel
  # (cancel-in-progress: false) — losing a tag-push release mid-flight
  # would mean PyPI/Docker get partial state. PR dry-runs are
  # namespaced by PR number and DO cancel: rapid PR pushes shouldn't
  # spawn N parallel wheel builds, only the latest matters.
  group: release-${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.pull_request.number) || github.ref_name }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# Default-deny floor: any future-added job that omits its own permissions
# block inherits nothing, not the repo-default token scope. Existing jobs
# are unaffected — each declares its own least-privilege permissions below.
permissions: {}

jobs:
  detect-version:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
    outputs:
      version: ${{ steps.ver.outputs.version }}
      canonical: ${{ steps.ver.outputs.canonical }}
      height: ${{ steps.ver.outputs.height }}
      bump: ${{ steps.ver.outputs.bump }}
      previous_tag: ${{ steps.ver.outputs.previous_tag }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      # When fired by release-please's release event, the tag the
      # bot just published IS the canonical version for this run —
      # release_version.py's git-log derivation would re-bump it.
      # workflow_dispatch REQUIRES `inputs.version` (TEST-28): without
      # it the script computes one bump AHEAD of every built artifact
      # (wheels carry pyproject's version), so the run would tag vX+1
      # over wheels versioned X — and `skip-existing: true` on the PyPI
      # step would silently no-op the mismatch. PR dry-runs leave
      # MANUAL_VER empty and the script computes normally.
      - name: Resolve MANUAL_VER from trigger
        id: manualver
        shell: bash
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          MANUAL_INPUT: ${{ github.event.inputs.version }}
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            # github.event.release.tag_name is "vX.Y.Z" — strip the
            # leading "v" so release_version.py's SemVer parser
            # accepts it.
            echo "value=${RELEASE_TAG#v}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ -z "$MANUAL_INPUT" ]; then
              echo "::error::workflow_dispatch requires inputs.version" \
                "(TEST-28): a computed version runs one bump ahead of the" \
                "built artifacts and mis-tags the release. Pass the version" \
                "that matches pyproject.toml."
              exit 1
            fi
            echo "value=$MANUAL_INPUT" >> "$GITHUB_OUTPUT"
          else
            # PR dry-run (X2): gate against what this tree actually
            # BUILDS — pyproject's version. The git-log derivation
            # computes the NEXT release version, which by definition
            # exceeds every artifact built from the PR tree, so the
            # collect-dist gate would fail on every feat PR touching
            # wheel paths. The dry-run's job is wheel-matrix build +
            # smoke-import + internal version consistency, not
            # predicting the future tag.
            echo "value=$(python3 -c 'import tomllib, pathlib; print(tomllib.loads(pathlib.Path("pyproject.toml").read_text())["project"]["version"])')" >> "$GITHUB_OUTPUT"
          fi

      - name: Compute semantic version from canonical + release history
        id: ver
        run: |
          python scripts/release_version.py
        env:
          MANUAL_VER: ${{ steps.manualver.outputs.value }}

  # Cross-platform wheel matrix. Each entry produces wheels for cp310/11/12/13
  # in one maturin invocation (PyO3 ABI3 forward-compat handles 3.14+ until
  # we bump pyo3 past 0.22). The `furl-ctx` wheel contains the entire
  # Python source under `furl_ctx/` plus the compiled `furl_ctx/_core.so`
  # — one atomic install via `pip install furl-ctx`.
  build-wheels:
    needs: [detect-version]
    # Minimal privilege: this job only checks out source, builds wheels,
    # and uploads them as artifacts. It doesn't push, write packages, or
    # mutate releases — `contents: read` is sufficient. Mitigates CodeQL
    # alert "actions/missing-workflow-permissions" (CWE-275).
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        # Quota guard (private repo, macOS bills 10x): PR dry-runs build
        # ONLY the Linux x86_64 wheel (+ sdist, keyed on that target) —
        # enough to gate buildability, version consistency, and
        # smoke-import before merge. The FULL matrix (Linux arm64 native
        # runner + macOS arm64) runs on real releases and manual
        # dispatch, where completeness matters.
        #
        # Full-matrix notes preserved: manylinux_2_28 is pinned explicitly
        # (auto resolved to manylinux2014/CentOS 7/OpenSSL 1.0.2k — too
        # old for openssl-sys 0.9). `ubuntu-24.04-arm` builds aarch64
        # natively (~10 min vs ~50-60 emulated), same wheel ABI.
        # `macos-15-intel` (x86_64-apple-darwin) restored: ort-sys once
        # shipped no prebuilt ONNX Runtime for it, but the ML-backend
        # excision removed ort-sys from the dependency graph entirely, so
        # the Intel blocker is gone (Q15).
        include: ${{ github.event_name == 'pull_request' && fromJSON('[{"os":"ubuntu-24.04","target":"x86_64-unknown-linux-gnu","manylinux":"2_28"}]') || fromJSON('[{"os":"ubuntu-24.04","target":"x86_64-unknown-linux-gnu","manylinux":"2_28"},{"os":"ubuntu-24.04-arm","target":"aarch64-unknown-linux-gnu","manylinux":"2_28"},{"os":"macos-14","target":"aarch64-apple-darwin","manylinux":""},{"os":"macos-15-intel","target":"x86_64-apple-darwin","manylinux":""}]') }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.11"

      - name: Build wheels
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist --interpreter python3.10 python3.11 python3.12 python3.13
          manylinux: ${{ matrix.manylinux }}
          # No before-script-linux needed: the rustls-everywhere refactor
          # (PR #371) switched fastembed to `hf-hub-rustls-tls` +
          # `ort-download-binaries-rustls-tls` features, which removed
          # `openssl-sys` from our build tree entirely. The wheel build
          # no longer needs system OpenSSL or any perl modules.
          # `cargo tree -p furl-py -i openssl-sys` returns "not
          # found".
        env:
          # PyO3 0.22 supports up to Python 3.13; allow forward-compat
          # builds for 3.14+ until we bump PyO3 (tracked separately).
          PYO3_USE_ABI3_FORWARD_COMPATIBILITY: "1"

      # Build sdist exactly once across the matrix. We key the
      # conditional on `target` only — sdist is platform-independent
      # so any single matrix row is a fine host. Earlier this
      # conditional was `matrix.os == 'ubuntu-latest' && matrix.target
      # == 'x86_64-unknown-linux-gnu'`. PR #376 pinned `os` to
      # `ubuntu-24.04` (instead of the moving `ubuntu-latest` alias)
      # and silently broke this `if`, so sdist never built and
      # `gh release upload release-assets/*.tar.gz` failed with
      # "no matches found". Keying on `target` decouples the sdist
      # build from any future `os` rename.
      - name: Build sdist (linux x86_64 only — sdist is platform-independent)
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1
        with:
          command: sdist
          args: --out dist

      - name: Verify sdist license-file metadata matches tarball contents
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: |
          python - <<'PY'
          # PyPI rejects sdists whose `License-File:` metadata entries
          # (PEP 639) reference files that aren't physically present
          # in the tarball: `400 License-File X does not exist in
          # distribution file ... at <root>/X`. This check catches
          # that divergence before upload by parsing PKG-INFO's
          # License-File lines and asserting each one resolves to a
          # real tarball member. Issue trail: sdist publish broke at
          # v0.20.16 when the hatch -> maturin migration in 2a91cbb
          # dropped NOTICE from the sdist `include` list while PEP 639
          # still emitted it as a License-File. Was masked for ~22
          # releases by an earlier twine "File already exists" failure
          # on duplicate wheels; surfaced once PR #412 added
          # skip-existing.
          from pathlib import Path
          import tarfile

          sdists = sorted(Path("dist").glob("*.tar.gz"))
          if len(sdists) != 1:
              raise SystemExit(f"expected exactly one sdist in dist/, found {len(sdists)}")

          with tarfile.open(sdists[0], "r:gz") as archive:
              names = set(archive.getnames())
              roots = {name.split("/", 1)[0] for name in names if "/" in name}
              if len(roots) != 1:
                  raise SystemExit(f"expected one sdist root directory, found {sorted(roots)}")
              root = roots.pop()

              pkg_info_path = f"{root}/PKG-INFO"
              member = archive.getmember(pkg_info_path)
              fh = archive.extractfile(member)
              if fh is None:
                  raise SystemExit(f"could not read {pkg_info_path} from {sdists[0].name}")
              pkg_info = fh.read().decode("utf-8")

          declared = []
          for line in pkg_info.splitlines():
              if not line.strip():
                  break  # headers ended (blank line separator); rest is README body
              if line.startswith("License-File:"):
                  declared.append(line.split(":", 1)[1].strip())

          if not declared:
              raise SystemExit(f"{sdists[0].name} PKG-INFO declares no License-File entries - expected at least LICENSE")

          missing = [name for name in declared if f"{root}/{name}" not in names]
          if missing:
              raise SystemExit(
                  f"{sdists[0].name} declares License-File entries that are missing from the tarball: {missing}. "
                  f"Add them to `[tool.maturin].include` with `format = \"sdist\"`."
              )

          print(f"sdist License-File metadata OK ({len(declared)} files, all present): {declared}")
          PY

      - name: Upload wheels artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.target }}
          path: dist/*

  # Aggregator step: merge all wheel artifacts into the canonical
  # `dist/` directory for downstream publishing jobs.
  collect-dist:
    needs: [detect-version, build-wheels]
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Download all wheel artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: wheels-*
          path: wheels-tmp/
          merge-multiple: true

      - name: Stage final dist directory
        run: |
          mkdir -p dist release-assets
          cp -v wheels-tmp/*.whl wheels-tmp/*.tar.gz dist/ 2>/dev/null || true
          ls -la dist/
          # Mirror the wheels into release-assets so create-release uploads them.
          cp -v dist/*.whl dist/*.tar.gz release-assets/ 2>/dev/null || true
          ls -la release-assets/

      # TEST-28: wheel-version <-> tag consistency gate. Every artifact in
      # dist/ must carry EXACTLY the version detect-version resolved — a
      # mismatch means the release would tag one version over artifacts
      # built as another (and `skip-existing: true` on the PyPI step would
      # silently no-op it). Fail loud here, before anything publishes.
      - name: Gate — dist/* versions must equal detect-version
        env:
          EXPECTED: ${{ needs.detect-version.outputs.version }}
        run: |
          python3 - <<'PY'
          import os, pathlib, sys
          expected = os.environ["EXPECTED"]
          artifacts = sorted(pathlib.Path("dist").iterdir())
          if not artifacts:
              sys.exit("dist/ is empty - nothing to gate")
          bad = []
          for f in artifacts:
              if f.name.endswith(".tar.gz"):
                  version = f.name[: -len(".tar.gz")].rsplit("-", 1)[-1]
              elif f.name.endswith(".whl"):
                  version = f.name.split("-")[1]
              else:
                  continue
              if version != expected:
                  bad.append(f"{f.name} (found {version})")
          if bad:
              sys.exit(
                  f"version mismatch: detect-version says {expected} but "
                  + "; ".join(bad)
              )
          print(f"OK: {len(artifacts)} dist artifacts all carry {expected}")
          PY

      - name: Upload merged dist artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: dist
          path: dist/

      - name: Upload merged release-assets artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: release-assets-merged
          path: release-assets/

  # ─── Wheel smoke-import gate ───────────────────────────────────────────────
  # Issue #355's bug class: `manylinux_2_28` wheels that build cleanly,
  # pass clippy/tests on the build host, pass auditwheel — and then
  # fail to import on a customer's box because of a runtime symbol
  # mismatch (#355: `__isoc23_strtoll` from gcc-14 ORT prebuilts;
  # earlier #371: openssl-sys's C23 wrappers).
  #
  # This job spins up a matrix of representative customer environments
  # — the manylinux floor we promise + common older/newer glibc + macOS
  # native — and runs the actual `import furl_ctx._core` check at
  # startup. Failure here BLOCKS publish-pypi and create-release. Better
  # to find a broken wheel here than 8 minutes after
  # `pypa/gh-action-pypi-publish` has already pushed it to the world.
  smoke-import-wheels:
    needs: [build-wheels]
    if: github.event.inputs.dry_run != 'true'
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        # Linux x86_64 spans manylinux floor + customer glibc:
        # `manylinux_2_28` is the floor we promise (fails here = our tag
        # lies); `ubuntu:22.04` (glibc 2.35) is issue #355's reporter env.
        # (`ubuntu:20.04 + py3.10` dropped PR #396 — deadsnakes stopped
        # provisioning on EOL focal; env failure, not wheel failure.)
        #
        # Quota guard (see build-wheels): PR dry-runs smoke ONLY the
        # x86_64 Linux wheel that PR builds — manylinux floor + the
        # most-reported customer env. Full sweep (Linux arm64 floor+22.04,
        # macOS arm64 native + macOS Intel) runs on real releases /
        # dispatch, matching the wheels actually built. The macOS Intel
        # (x86_64-apple-darwin) row was restored after the ML-backend
        # excision removed ort-sys — the historical Intel blocker.
        include: ${{ github.event_name == 'pull_request' && fromJSON('[{"runner":"ubuntu-24.04","image":"quay.io/pypa/manylinux_2_28_x86_64","python":"3.11","wheel_target":"x86_64-unknown-linux-gnu","wheel_artifact":"wheels-ubuntu-24.04-x86_64-unknown-linux-gnu","glibc_label":"2.28-floor"},{"runner":"ubuntu-24.04","image":"ubuntu:22.04","python":"3.12","wheel_target":"x86_64-unknown-linux-gnu","wheel_artifact":"wheels-ubuntu-24.04-x86_64-unknown-linux-gnu","glibc_label":"2.35"}]') || fromJSON('[{"runner":"ubuntu-24.04","image":"quay.io/pypa/manylinux_2_28_x86_64","python":"3.11","wheel_target":"x86_64-unknown-linux-gnu","wheel_artifact":"wheels-ubuntu-24.04-x86_64-unknown-linux-gnu","glibc_label":"2.28-floor"},{"runner":"ubuntu-24.04","image":"ubuntu:22.04","python":"3.12","wheel_target":"x86_64-unknown-linux-gnu","wheel_artifact":"wheels-ubuntu-24.04-x86_64-unknown-linux-gnu","glibc_label":"2.35"},{"runner":"ubuntu-24.04-arm","image":"quay.io/pypa/manylinux_2_28_aarch64","python":"3.11","wheel_target":"aarch64-unknown-linux-gnu","wheel_artifact":"wheels-ubuntu-24.04-arm-aarch64-unknown-linux-gnu","glibc_label":"2.28-floor"},{"runner":"ubuntu-24.04-arm","image":"ubuntu:22.04","python":"3.12","wheel_target":"aarch64-unknown-linux-gnu","wheel_artifact":"wheels-ubuntu-24.04-arm-aarch64-unknown-linux-gnu","glibc_label":"2.35"},{"runner":"macos-14","image":"","python":"3.13","wheel_target":"aarch64-apple-darwin","wheel_artifact":"wheels-macos-14-aarch64-apple-darwin","glibc_label":""},{"runner":"macos-15-intel","image":"","python":"3.13","wheel_target":"x86_64-apple-darwin","wheel_artifact":"wheels-macos-15-intel-x86_64-apple-darwin","glibc_label":""}]') }}

    steps:
      - name: Download wheels artifact for this target
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: ${{ matrix.wheel_artifact }}
          path: dist/

      - name: Stage smoke-import script
        # The smoke script lives in a host file rather than an inline
        # heredoc/`-c` invocation. Rationale:
        #
        # 1. The Linux job wraps the smoke check in `bash -ec '<long>'`
        #    where the outer single quote preserves whitespace AND
        #    forbids any internal single quote (closing it terminates
        #    the script). A `<<PY ... PY` heredoc inside the inner bash
        #    inherits the YAML indentation, so the closing `PY` is at
        #    column 14, never matched (caught post-#387 merge: bash
        #    "here-document at line 65 delimited by end-of-file").
        # 2. Switching to `python -c "<f-string>"` solves the heredoc
        #    indent problem but reintroduces the single-quote nesting
        #    issue (Python f-strings need quote chars).
        # 3. A host-side file dodges both: bash heredoc body lives at
        #    YAML `run: |` level (uniform strip), the docker container
        #    sees it as a read-only mount, and macOS host runs the
        #    same script — no quoting drift between paths.
        run: |
          cat > "${RUNNER_TEMP}/smoke_import.py" <<'PY'
          import sys
          import furl_ctx
          from furl_ctx._core import hello as _rust_hello
          print(f"smoke-import OK: python={sys.version_info[:3]} hello={_rust_hello()}")

          # CAVEAT-02 hardening: `import furl_ctx` alone (the check above) does not
          # prove the wheel shipped a working CLI. The 0.27.0 wheel imported cleanly
          # and STILL had no console script and no furl_ctx.cli module (RECORD had
          # no furl_ctx/cli.py, dist-info had no entry_points.txt). Everything below
          # proves the full CLI + library surface a `pip install furl-ctx` user gets
          # is actually present and runnable, in this same clean venv with ONLY the
          # wheel installed.

          # (1) Public library exports (furl_ctx/__init__.py) a pip-only user relies on.
          from furl_ctx import compress, retrieve, purge, resolve_markers  # noqa: F401
          print("smoke-exports OK: compress, retrieve, purge, resolve_markers all importable")

          # (2) Wheel metadata: the `furl` console script must be a registered entry
          # point of the `furl-ctx` distribution (pyproject.toml declares
          # `furl = "furl_ctx.cli:main"` under [project.scripts]). Belt-and-braces
          # with the executable check below: this proves the *metadata* is correct
          # even if PATH/shim resolution were ever flaky.
          from importlib import metadata

          dist = metadata.distribution("furl-ctx")
          console_scripts = {
              ep.name: ep.value for ep in dist.entry_points if ep.group == "console_scripts"
          }
          if console_scripts.get("furl") != "furl_ctx.cli:main":
              sys.exit(
                  "smoke-FAIL: furl-ctx wheel has no console_scripts entry point "
                  f"'furl = furl_ctx.cli:main' (found: {console_scripts})"
              )
          print(f"smoke-entrypoint OK: console_scripts={console_scripts}")

          # (3) The `furl` executable itself. pip installs console scripts into the
          # same bin/ directory as the interpreter that ran pip, so this is the
          # venv-relative path regardless of OS or venv location (no PATH needed).
          import pathlib
          import subprocess

          furl_bin = str(pathlib.Path(sys.executable).parent / "furl")

          help_proc = subprocess.run([furl_bin, "--help"], capture_output=True, text=True, timeout=30)
          if help_proc.returncode != 0:
              sys.exit(
                  f"smoke-FAIL: '{furl_bin} --help' exited {help_proc.returncode}\n"
                  f"stdout={help_proc.stdout}\nstderr={help_proc.stderr}"
              )
          print("smoke-cli-help OK: furl --help exited 0")

          # (4) Minimal end-to-end: pipe a small JSON blob through `furl compress` and
          # assert exit 0 + non-empty output. --model is deliberately an unrecognized
          # name: MODEL_PATTERNS (furl_ctx/tokenizers/registry.py) only routes
          # gpt-*/o1/o3/text-embedding*/text-davinci/code-*/davinci/curie/babbage/ada/
          # claude-*/gemini/palm/command to a real tokenizer backend (tiktoken, which
          # downloads its BPE vocab file from openaipublic.blob.core.windows.net on a
          # cold cache -- empirically confirmed: a cold-cache fetch of the DEFAULT
          # model's encoding either fails or stalls well past furl's own 10s internal
          # timeout before falling back). Any other model name resolves to the local
          # EstimatingTokenCounter (regex/length heuristics, zero I/O), keeping this
          # gate offline and fast on every runner regardless of network conditions.
          import json

          sample_input = json.dumps({"role": "tool", "content": "furl release smoke-test payload"})
          compress_proc = subprocess.run(
              [furl_bin, "compress", "--model", "furl-ci-smoke-estimator", "--json"],
              input=sample_input,
              capture_output=True,
              text=True,
              timeout=30,
          )
          if compress_proc.returncode != 0:
              sys.exit(
                  f"smoke-FAIL: '{furl_bin} compress' exited {compress_proc.returncode}\n"
                  f"stdout={compress_proc.stdout}\nstderr={compress_proc.stderr}"
              )
          if not compress_proc.stdout.strip():
              sys.exit("smoke-FAIL: 'furl compress' produced empty stdout")
          compress_payload = json.loads(compress_proc.stdout)
          if not compress_payload.get("compressed"):
              sys.exit(f"smoke-FAIL: 'furl compress' JSON missing non-empty 'compressed': {compress_payload}")
          if compress_payload.get("error") is not None:
              sys.exit(f"smoke-FAIL: 'furl compress' reported a fail-open error: {compress_payload.get('error')}")
          print(
              "smoke-cli-compress OK: "
              f"tokens_before={compress_payload.get('tokens_before')} "
              f"tokens_after={compress_payload.get('tokens_after')}"
          )
          PY

      - name: Smoke-import wheel inside container (Linux)
        if: matrix.image != ''
        env:
          IMAGE: ${{ matrix.image }}
          PYTHON_VERSION: ${{ matrix.python }}
          WHEEL_TARGET: ${{ matrix.wheel_target }}
          GLIBC_LABEL: ${{ matrix.glibc_label }}
        run: |
          set -e
          # The container script intentionally avoids `<<EOF` heredoc
          # interpolation by passing values via env vars — keeps the
          # shell quoting straightforward and makes failure modes
          # easier to debug.
          docker run --rm \
            -v "$(pwd)/dist:/wheels:ro" \
            -v "${RUNNER_TEMP}/smoke_import.py:/smoke_import.py:ro" \
            -e PYTHON_VERSION="$PYTHON_VERSION" \
            -e WHEEL_TARGET="$WHEEL_TARGET" \
            -e GLIBC_LABEL="$GLIBC_LABEL" \
            "$IMAGE" \
            bash -ec '
              set -e
              echo "=== smoke-import: image=$0 python=$PYTHON_VERSION glibc=$GLIBC_LABEL target=$WHEEL_TARGET ===" "'"$IMAGE"'"

              # Locate a Python interpreter matching the requested
              # version. manylinux images ship interpreters under
              # /opt/python/cp{XY}-cp{XY}/bin/; ubuntu/debian images
              # need an apt-get install.
              py_tag=cp$(echo "$PYTHON_VERSION" | tr -d .)
              if [ -d /opt/python ]; then
                python_bin="/opt/python/${py_tag}-${py_tag}/bin/python"
                if [ ! -x "$python_bin" ]; then
                  echo "ERROR: $python_bin missing in $0" "'"$IMAGE"'" >&2
                  ls -la /opt/python >&2
                  exit 1
                fi
              elif command -v apt-get >/dev/null 2>&1; then
                export DEBIAN_FRONTEND=noninteractive
                apt-get update -qq
                # ubuntu:20.04s default repo only ships 3.8; 3.10 lives
                # in deadsnakes. Add it on demand. ubuntu:22.04 has
                # 3.10/3.11 in main and 3.12 via deadsnakes.
                apt-get install -y -qq --no-install-recommends ca-certificates software-properties-common >/dev/null
                # Launchpad occasionally flakes on this add (seen on the x86
                # runner only, arm passed the same run) — retry a few times
                # with a short pause so a transient flake self-heals, but a
                # real failure names itself here instead of resurfacing three
                # steps later as a phantom "Unable to locate package
                # python$PYTHON_VERSION" error.
                ppa_added=0
                for attempt in 1 2 3; do
                  if add-apt-repository -y ppa:deadsnakes/ppa >/dev/null; then
                    ppa_added=1
                    break
                  fi
                  echo "WARN: add-apt-repository ppa:deadsnakes/ppa failed (attempt $attempt/3)" >&2
                  if [ "$attempt" -lt 3 ]; then
                    sleep 2
                  fi
                done
                if [ "$ppa_added" -ne 1 ]; then
                  echo "ERROR: add-apt-repository ppa:deadsnakes/ppa failed after 3 attempts; python$PYTHON_VERSION may not be installable without it" >&2
                  exit 1
                fi
                apt-get update -qq
                apt-get install -y -qq --no-install-recommends \
                  "python$PYTHON_VERSION" \
                  "python$PYTHON_VERSION-venv" \
                  "python$PYTHON_VERSION-distutils" >/dev/null 2>&1 \
                || apt-get install -y -qq --no-install-recommends \
                  "python$PYTHON_VERSION" \
                  "python$PYTHON_VERSION-venv" >/dev/null
                python_bin="python$PYTHON_VERSION"
              else
                echo "ERROR: image has neither /opt/python nor apt-get" >&2
                exit 1
              fi
              "$python_bin" --version

              # Print glibc version so failures show what we are
              # actually testing against.
              ldd --version | head -1 || true

              # Pick the wheel that matches python version + arch.
              case "$WHEEL_TARGET" in
                x86_64-unknown-linux-gnu)  arch_tag=manylinux_2_28_x86_64 ;;
                aarch64-unknown-linux-gnu) arch_tag=manylinux_2_28_aarch64 ;;
                *) echo "ERROR: unknown wheel target $WHEEL_TARGET" >&2; exit 1 ;;
              esac
              whl=$(find /wheels -maxdepth 1 -type f -name "furl_ctx-*-${py_tag}-${py_tag}-${arch_tag}.whl" -print -quit)
              if [ -z "$whl" ]; then
                # No version-specific wheel — fall back to a stable-ABI
                # (abi3) wheel. A cp3<floor>-abi3 wheel installs on any
                # CPython >= floor, which is what makes a single wheel
                # forward-compatible to 3.14+ (Cargo.toml pyo3 abi3-py310).
                # Pick the abi3 wheel whose floor is <= the interpreter.
                py_minor=${PYTHON_VERSION#*.}
                abi3=$(find /wheels -maxdepth 1 -type f -name "furl_ctx-*-abi3-${arch_tag}.whl" -print -quit)
                if [ -n "$abi3" ]; then
                  abi3_base=${abi3##*/}
                  abi3_floor=${abi3_base#*-cp3}
                  abi3_floor=${abi3_floor%%-*}
                  case "$abi3_floor" in *[!0-9]*) abi3_floor= ;; esac
                  if [ -n "$abi3_floor" ] && [ "$abi3_floor" -le "$py_minor" ]; then whl="$abi3"; fi
                fi
              fi
              if [ -z "$whl" ]; then
                echo "ERROR: no wheel matching python=$PYTHON_VERSION arch=$arch_tag in /wheels/" >&2
                find /wheels -maxdepth 1 -type f -printf "%f\n" >&2
                exit 1
              fi
              echo "Installing: $whl"

              "$python_bin" -m venv /tmp/venv
              /tmp/venv/bin/pip install --quiet --upgrade pip
              /tmp/venv/bin/pip install --quiet "$whl"

              # The actual smoke check — mirrors the proxy
              # `_check_rust_core` path that fails with exit-78 on
              # broken wheels. The script is mounted from the host via
              # `-v ${RUNNER_TEMP}/smoke_import.py:/smoke_import.py:ro`;
              # see the "Stage smoke-import script" step above for why
              # an inline heredoc here would not work.
              /tmp/venv/bin/python /smoke_import.py
            '

      - name: Smoke-import wheel on macOS host
        if: matrix.image == ''
        env:
          PYTHON_VERSION: ${{ matrix.python }}
          WHEEL_TARGET: ${{ matrix.wheel_target }}
        run: |
          set -e
          py_tag=cp$(echo "$PYTHON_VERSION" | tr -d .)
          # macOS wheels are tagged by arch: arm64 (Apple Silicon) or
          # x86_64 (Intel). Map the target triple to the wheel arch tag,
          # mirroring the Linux path's case above.
          case "$WHEEL_TARGET" in
            aarch64-apple-darwin) arch=arm64 ;;
            x86_64-apple-darwin)  arch=x86_64 ;;
            *) echo "ERROR: unknown wheel target $WHEEL_TARGET" >&2; exit 1 ;;
          esac
          whl=$(find dist -maxdepth 1 -type f -name "furl_ctx-*-${py_tag}-${py_tag}-macosx_*_${arch}.whl" -print -quit)
          if [ -z "$whl" ]; then
            # Stable-ABI (abi3) fallback — see the Linux path above. A
            # cp3<floor>-abi3 wheel installs on any CPython >= floor.
            py_minor=${PYTHON_VERSION#*.}
            abi3=$(find dist -maxdepth 1 -type f -name "furl_ctx-*-abi3-macosx_*_${arch}.whl" -print -quit)
            if [ -n "$abi3" ]; then
              abi3_base=${abi3##*/}
              abi3_floor=${abi3_base#*-cp3}
              abi3_floor=${abi3_floor%%-*}
              case "$abi3_floor" in *[!0-9]*) abi3_floor= ;; esac
              if [ -n "$abi3_floor" ] && [ "$abi3_floor" -le "$py_minor" ]; then whl="$abi3"; fi
            fi
          fi
          if [ -z "$whl" ]; then
            echo "ERROR: no macOS wheel matching python=$PYTHON_VERSION"
            find dist -maxdepth 1 -type f -exec basename {} \;
            exit 1
          fi
          echo "Installing: $whl"

          # Use the system python at the requested minor version. The
          # macos-14 runner image preinstalls multiple Python versions.
          "python$PYTHON_VERSION" -m venv /tmp/venv
          /tmp/venv/bin/pip install --quiet --upgrade pip
          /tmp/venv/bin/pip install --quiet "$whl"
          # Same staged smoke script as the Linux container path uses,
          # invoked directly on the macOS host (no docker mount needed).
          /tmp/venv/bin/python "${RUNNER_TEMP}/smoke_import.py"

  publish-pypi:
    needs: [collect-dist, smoke-import-wheels]
    # X2: skip on pull_request — dry-run only verifies build+smoke,
    # never publishes. The other two predicates remain (workflow_dispatch
    # dry_run, vars-level skip).
    if: github.event_name != 'pull_request' && github.event.inputs.dry_run != 'true' && vars.PYPI_SKIP != 'true'
    environment: pypi  # NOTE: environment name must be a literal; update here if the GitHub environment name changes
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      id-token: write  # Required for OIDC trusted publishing
    steps:
      - name: Download merged dist artifact (sdist + cross-platform wheels)
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: dist
          path: dist/

      - name: Publish ${{ env.PYPI_PACKAGE }} to PyPI
        id: pypi-publish
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          # Idempotent re-runs: when a wheel filename for the computed
          # version is already on PyPI (e.g. a previous push to main
          # already published this version, or this run's computed
          # semver hasn't bumped past the last release), treat the
          # existing file as a no-op instead of a hard failure. PyPA's
          # recommended pattern for release workflows that may run
          # multiple times against the same version.
          skip-existing: true

  create-release:
    needs: [detect-version, build-wheels, collect-dist, smoke-import-wheels, publish-pypi]
    if: >-
      ${{
        always() &&
        github.event_name != 'pull_request' &&
        github.event.inputs.dry_run != 'true' &&
        needs.detect-version.result == 'success' &&
        needs.build-wheels.result == 'success' &&
        needs.collect-dist.result == 'success' &&
        needs.smoke-import-wheels.result == 'success' &&
        (vars.PYPI_SKIP == 'true' || needs.publish-pypi.result == 'success')
      }}
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Download merged release assets (wheels + sdist)
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: release-assets-merged
          path: release-assets

      - name: Show release assets
        run: |
          ls -la release-assets

      - name: Create or update GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ needs.detect-version.outputs.version }}"
          TITLE="Release v${{ needs.detect-version.outputs.version }}"
          if gh release view "$TAG" > /dev/null 2>&1; then
            # Release already exists — typically created by
            # release-please on release-PR merge with an auto-
            # generated changelog body. Don't overwrite its notes;
            # only sync the title in case detect-version's canonical
            # form differs from what the bot set.
            gh release edit "$TAG" --title "$TITLE"
          else
            # workflow_dispatch path: no release-please body exists yet,
            # so let GitHub auto-generate the notes from commit history.
            gh release create "$TAG" --title "$TITLE" --generate-notes
          fi

      - name: Publish ${{ env.PYPI_PACKAGE }} Python distributions to GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ needs.detect-version.outputs.version }}"
          gh release upload "$TAG" release-assets/*.whl release-assets/*.tar.gz --clobber

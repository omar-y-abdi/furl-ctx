name: Dev Containers

on:
  push:
    branches: [main]
    paths:
      - ".devcontainer/**"
      - ".github/workflows/devcontainers.yml"
      - "pyproject.toml"
      - "uv.lock"
  pull_request:
    branches: [main]
    paths:
      - ".devcontainer/**"
      - ".github/workflows/devcontainers.yml"
      - "pyproject.toml"
      - "uv.lock"
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: default
            config: .devcontainer/devcontainer.json

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "20"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Install Dev Container CLI
        run: npm install -g @devcontainers/cli@0.85.0

      - name: Start ${{ matrix.name }}
        run: devcontainer up --workspace-folder . --config ${{ matrix.config }} --remove-existing-container

      - name: Smoke test ${{ matrix.name }}
        run: devcontainer exec --workspace-folder . --config ${{ matrix.config }} bash -lc 'git rev-parse --show-toplevel >/dev/null && uv --version && node --version && gh --version >/dev/null && uv run python -c "import furl_ctx; print(\"default smoke test passed\")"'

  validate-worktree:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Create linked worktree
        run: git worktree add "$RUNNER_TEMP/furl-worktree" HEAD

      - name: Set up Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "20"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Install Dev Container CLI
        run: npm install -g @devcontainers/cli@0.85.0

      - name: Start linked worktree devcontainer
        run: devcontainer up --workspace-folder "$RUNNER_TEMP/furl-worktree" --config "$RUNNER_TEMP/furl-worktree/.devcontainer/devcontainer.json" --remove-existing-container

      - name: Smoke test linked worktree
        run: devcontainer exec --workspace-folder "$RUNNER_TEMP/furl-worktree" --config "$RUNNER_TEMP/furl-worktree/.devcontainer/devcontainer.json" bash -lc 'git rev-parse --show-toplevel && uv run python -c "import furl_ctx; print(\"worktree smoke test passed\")"'

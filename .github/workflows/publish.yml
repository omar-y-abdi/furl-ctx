name: Publish to PyPI (manual fallback)

# DEPRECATED: This workflow is superseded by release.yml's matrix-based
# build-and-publish flow. It exists as a manual fallback in case release.yml
# is broken and a hotfix needs to be pushed without going through the
# normal tag-driven pipeline. Single-platform; produces only the linux
# x86_64 wheel + sdist. For full cross-platform release, use release.yml.
on:
  workflow_dispatch:

# Least-privilege default floor; the publish job below overrides this with the
# id-token + contents write it needs (a job-level block fully replaces this).
permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: pypi
    permissions:
      id-token: write  # For trusted publishing
      contents: write  # For uploading release assets

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.11"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
        with:
          toolchain: 1.95.0  # keep in sync with rust-toolchain.toml (TEST-30)

      - name: Cache cargo registry + build
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: ". -> target"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip 'maturin>=1.9,<2.0' 'cyclonedx-bom>=7,<8'

      - name: Build wheel + sdist
        run: |
          maturin sdist --out dist
          maturin build --release --out dist

      - name: Generate SBOM (CycloneDX)
        run: |
          pip install -e "."
          cyclonedx-py environment \
            --output-format json \
            --output-file dist/furl-sbom.cdx.json

      - name: Upload SBOM to release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3
        with:
          files: dist/furl-sbom.cdx.json

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1

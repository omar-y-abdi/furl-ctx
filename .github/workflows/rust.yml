name: rust

on:
  # Quota guard: no push trigger — main only receives squash-merged PRs
  # whose tree the PR run already tested (ruleset-required checks), so
  # the post-merge re-run was pure double-billing. Weekly cron guards
  # against toolchain/dependency drift on an untouched tree.
  pull_request:
    paths:
      - 'crates/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'rust-toolchain.toml'
      - 'Makefile'
      - '.github/workflows/rust.yml'
  schedule:
    - cron: "15 6 * * 1"
  workflow_dispatch:

concurrency:
  group: rust-${{ github.ref }}
  cancel-in-progress: true

# Default permissions: read-only. Individual jobs override only what they need.
# Mitigates CodeQL/CWE-275 (missing-workflow-permissions): the GITHUB_TOKEN
# defaults to whatever the repo policy is, which can be read-write. Pinning
# this here means even if the repo default changes, this workflow stays safe.
permissions:
  contents: read

jobs:
  test:
    name: test (ubuntu)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - name: Install stable toolchain
        # Pin action code to @stable (latest fixes), toolchain version
        # via input. The @1.95.0 ref shipped action code that errors on
        # ubuntu-latest with `detected conflict: 'bin/cargo-clippy'`
        # because the pre-installed runner Rust collides with the
        # clippy-preview component install.
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95.0
          components: rustfmt, clippy
      - name: Cache cargo registry + build
        uses: Swatinem/rust-cache@v2
      - name: cargo fmt --check
        run: cargo fmt --all -- --check
      - name: cargo clippy
        run: cargo clippy --workspace -- -D warnings
      - name: cargo test
        run: cargo test --workspace

  wheels:
    name: wheels (${{ matrix.target }})
    # Quota guard: NOT on PRs. This job's macOS leg bills 10x (private
    # repo) on every crates-touching PR, and PR-time Linux buildability
    # is already covered by CI's required `build-wheel` check; the full
    # cross-platform wheel gate runs in release.yml's dry-run/release
    # matrix. Weekly cron + manual dispatch keep the drift signal.
    if: github.event_name != 'pull_request'
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            maturin-target: x86_64
          - os: macos-14
            target: aarch64-apple-darwin
            maturin-target: aarch64-apple-darwin
        # macOS x86_64 (Intel) is NOT in this matrix.
        # `fastembed` → `ort` → `ort-sys` does not publish prebuilt ONNX
        # Runtime binaries for `x86_64-apple-darwin`; building from source
        # in CI is a multi-hour cmake job. Apple Silicon has been the
        # default macOS target since 2020 and is sufficient for the wheels
        # we ship. If a customer needs Intel macOS, build from source
        # locally (the toolchain works; only prebuilt distribution skips
        # this target).
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: "Build wheel (single-wheel architecture builds furl-ctx)"
        uses: PyO3/maturin-action@v1
        # Maturin reads `[tool.maturin]` from the root `pyproject.toml`
        # which points at `crates/furl-py/Cargo.toml` for the cdylib.
        # Output is `furl_ctx-<ver>-<py>-<py>-<platform>.whl` containing
        # both Python source and the compiled `furl_ctx/_core.so`.
        with:
          command: build
          args: --release --out dist
          target: ${{ matrix.maturin-target }}
      - name: Upload wheel artifact
        uses: actions/upload-artifact@v7
        with:
          name: wheels-${{ matrix.target }}
          path: dist/*.whl

  audit:
    name: audit
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95.0
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-audit + cargo-deny
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit,cargo-deny
      # SEC-8: both steps used to run `continue-on-error: true`, so a critical
      # RUSTSEC advisory in the statically-linked graph (which vendors onig_sys
      # C/C++ and ring) could never turn CI red. They hard-fail now — each as
      # its own named step so a red run points at the exact gate. The audit
      # soft-fail arrived unexplained with the inherited initial commit; no
      # flakiness was ever recorded for it, and an audit failure on a freshly
      # published advisory is the signal working as designed, not flake.
      - name: cargo audit
        run: cargo audit
      - name: cargo deny check licenses
        run: cargo deny check licenses

version: 2
updates:
  # GitHub Actions version updates
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: "ci"
    groups:
      actions-minor-patch:
        update-types:
          - "minor"
          - "patch"

  # Python dependency updates (pip)
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: "deps"
    # Only open PRs for security updates to avoid noise
    open-pull-requests-limit: 5
    groups:
      pip-minor-patch:
        update-types:
          - "minor"
          - "patch"

  # Rust dependency updates (cargo) — SEC-8: without this entry the Rust
  # graph (the one cargo-audit gates) never received update PRs at all.
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
    commit-message:
      # "deps" for BOTH ecosystems (TEST-29): commitlint's type-enum now
      # includes "deps" (.commitlintrc.json), release-please already maps
      # it to a "Dependencies" changelog section, and release_version.py
      # classifies it as a patch bump — one convention, three configs.
      prefix: "deps"
    open-pull-requests-limit: 5
    groups:
      cargo-minor-patch:
        update-types:
          - "minor"
          - "patch"

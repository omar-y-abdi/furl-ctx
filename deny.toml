# cargo-deny configuration for the Rust workspace. Deliberately permissive:
# the license allow-list below covers the permissive-license set the
# workspace actually resolves; bans/sources only warn. Tighten as an
# explicit decision (e.g. pin multiple-versions to "deny") — the original
# "Phase 0 / Phase 2" schedule this file referenced is long gone.

[graph]
all-features = false

[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "CC0-1.0",
    "Zlib",
    "0BSD",
    "MPL-2.0",
]
confidence-threshold = 0.8
exceptions = []

[bans]
multiple-versions = "allow"
wildcards = "allow"

[sources]
unknown-registry = "warn"
unknown-git = "warn"
